<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECaT Higher or Lower</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #070816;
            --panel: rgba(15, 23, 42, 0.88);
            --panel-solid: #111827;
            --border: rgba(148, 163, 184, 0.24);
            --muted: #94a3b8;
            --text: #f8fafc;

            --pink: #ec4899;
            --purple: #8b5cf6;
            --blue: #38bdf8;
            --cyan: #22d3ee;
            --green: #22c55e;
            --lime: #a3e635;
            --yellow: #facc15;
            --orange: #fb923c;
            --red: #ef4444;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(236, 72, 153, 0.26), transparent 34%),
                radial-gradient(circle at top right, rgba(56, 189, 248, 0.24), transparent 34%),
                radial-gradient(circle at bottom, rgba(139, 92, 246, 0.24), transparent 36%),
                var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        .game {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-shell {
            background: rgba(2, 6, 23, 0.68);
            border-bottom: 1px solid var(--border);
            padding: 14px 22px 16px;
            backdrop-filter: blur(16px);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
        }

        .nav-bar {
            max-width: 1220px;
            margin: 0 auto 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.76);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 12px 16px;
        }

        .brand {
            font-size: 20px;
            font-weight: 950;
            letter-spacing: -0.03em;
        }

        .brand span {
            color: var(--yellow);
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            padding: 9px 14px;
            border-radius: 999px;
            font-weight: 850;
            font-size: 14px;
        }

        .nav-links a.active {
            color: #020617;
            background: linear-gradient(135deg, var(--yellow), var(--orange));
        }

        .nav-links a:hover {
            color: white;
            background: rgba(255, 255, 255, 0.10);
        }

        .hud {
            max-width: 1220px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.2fr 0.95fr;
            gap: 14px;
            align-items: stretch;
        }

        .title-card {
            background:
                linear-gradient(135deg, rgba(236, 72, 153, 0.18), rgba(56, 189, 248, 0.12)),
                rgba(15, 23, 42, 0.74);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 18px 20px;
            overflow: hidden;
            position: relative;
        }

        .title-card::after {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            right: -80px;
            top: -90px;
            border-radius: 999px;
            background: rgba(250, 204, 21, 0.18);
            filter: blur(6px);
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .title-card h1 {
            margin: 0;
            font-size: 34px;
            line-height: 1;
            letter-spacing: -0.05em;
        }

        .score-chip {
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            padding: 8px 13px;
            font-size: 14px;
            font-weight: 950;
            white-space: nowrap;
            color: #e0f2fe;
        }

        .question-clear {
            position: relative;
            z-index: 1;
            margin-top: 12px;
            font-size: 17px;
            line-height: 1.45;
            color: #e5e7eb;
        }

        .question-clear strong {
            color: var(--yellow);
        }

        .game-meter {
            background:
                linear-gradient(135deg, rgba(34, 211, 238, 0.10), rgba(236, 72, 153, 0.10)),
                rgba(15, 23, 42, 0.82);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        .game-meter::before {
            content: "";
            position: absolute;
            width: 160px;
            height: 160px;
            right: -70px;
            bottom: -90px;
            border-radius: 999px;
            background: rgba(34, 197, 94, 0.20);
            filter: blur(7px);
        }

        .meter-top {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .coin-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(250, 204, 21, 0.22), rgba(251, 146, 60, 0.12));
            border: 1px solid rgba(250, 204, 21, 0.32);
            border-radius: 999px;
            padding: 10px 14px;
            font-weight: 950;
            color: #fde68a;
            box-shadow: 0 0 26px rgba(250, 204, 21, 0.16);
            white-space: nowrap;
        }

        .coin-icon {
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            color: #713f12;
            background: linear-gradient(135deg, #fde68a, #f59e0b);
            box-shadow: 0 0 18px rgba(250, 204, 21, 0.42);
        }

        .meter-reset {
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.08);
            color: #e5e7eb;
            border-radius: 999px;
            padding: 9px 12px;
            font-size: 13px;
            font-weight: 950;
            transition: transform 0.15s ease, background 0.15s ease;
            white-space: nowrap;
        }

        .meter-reset:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.16);
        }

        .meter-main {
            position: relative;
            z-index: 1;
        }

        .meter-label-row {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 12px;
            margin-bottom: 9px;
        }

        .meter-label {
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.09em;
        }

        .streak-big {
            font-size: 24px;
            font-weight: 950;
            color: #f9a8d4;
            letter-spacing: -0.05em;
        }

        .streak-big span {
            color: white;
            font-size: 13px;
            letter-spacing: 0;
            margin-left: 4px;
        }

        .power-track {
            height: 18px;
            background: rgba(2, 6, 23, 0.68);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.32);
        }

        .power-fill {
            height: 100%;
            width: 0%;
            border-radius: 999px;
            background:
                linear-gradient(90deg, var(--green), var(--yellow), var(--orange), var(--pink));
            box-shadow: 0 0 24px rgba(250, 204, 21, 0.45);
            transition: width 0.35s ease;
        }

        .power-glint {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            width: 35%;
            animation: glint 2.3s infinite linear;
            opacity: 0.75;
        }

        @keyframes glint {
            from { transform: translateX(-120%); }
            to { transform: translateX(330%); }
        }

        .meter-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .meter-mini {
            background: rgba(2, 6, 23, 0.38);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 16px;
            padding: 10px 12px;
        }

        .mini-label {
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 950;
            margin-bottom: 4px;
        }

        .mini-value {
            font-size: 22px;
            font-weight: 950;
            letter-spacing: -0.05em;
        }

        .mini-value.reward {
            color: #86efac;
        }

        .mini-value.risk {
            color: #fca5a5;
        }

        .preload-status {
            max-width: 1220px;
            margin: 9px auto 0;
            font-size: 13px;
            color: #a5b4fc;
            text-align: right;
        }

        .cards {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 560px;
        }

        .card {
            position: relative;
            padding: 42px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 25% 20%, rgba(255, 255, 255, 0.22), transparent 26%),
                radial-gradient(circle at 80% 75%, rgba(255, 255, 255, 0.14), transparent 30%);
            pointer-events: none;
        }

        .left-card {
            background:
                linear-gradient(135deg, rgba(59, 130, 246, 0.88), rgba(79, 70, 229, 0.96)),
                #1d4ed8;
        }

        .right-card {
            background:
                linear-gradient(135deg, rgba(236, 72, 153, 0.88), rgba(220, 38, 38, 0.96)),
                #be123c;
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .course-code {
            font-size: 52px;
            font-weight: 950;
            margin-bottom: 12px;
            letter-spacing: -0.06em;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        }

        .course-name {
            font-size: 22px;
            margin: 0 auto 16px;
            line-height: 1.35;
            max-width: 560px;
            color: rgba(255, 255, 255, 0.92);
        }

        .offering {
            display: inline-block;
            font-size: 16px;
            color: #e5e7eb;
            margin-bottom: 28px;
            background: rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            padding: 9px 14px;
            font-weight: 800;
        }

        .answer-label {
            font-size: 18px;
            margin-bottom: 10px;
            color: #fef3c7;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .percent,
        .hidden-percent {
            font-size: 88px;
            font-weight: 950;
            margin: 12px 0;
            letter-spacing: -0.08em;
            text-shadow: 0 14px 38px rgba(0, 0, 0, 0.30);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 28px;
        }

        .choice-button {
            cursor: pointer;
            border: none;
            padding: 17px 34px;
            border-radius: 999px;
            font-size: 20px;
            font-weight: 950;
            color: #020617;
            background: white;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .choice-button:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 20px 44px rgba(0, 0, 0, 0.32);
        }

        .choice-button.higher {
            background: linear-gradient(135deg, #bbf7d0, #22c55e);
        }

        .choice-button.lower {
            background: linear-gradient(135deg, #fecaca, #fb7185);
        }

        .message {
            min-height: 88px;
            margin-top: 26px;
            font-size: 25px;
            font-weight: 950;
            line-height: 1.35;
        }

        .loading {
            padding: 34px;
            text-align: center;
            font-size: 22px;
            color: var(--yellow);
            font-weight: 900;
        }

        .next-button {
            cursor: pointer;
            border: none;
            margin-top: 18px;
            padding: 17px 32px;
            border-radius: 999px;
            font-size: 19px;
            font-weight: 950;
            color: #052e16;
            background: linear-gradient(135deg, #bef264, #22c55e);
            box-shadow: 0 16px 38px rgba(34, 197, 94, 0.35);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .next-button:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 20px 46px rgba(34, 197, 94, 0.45);
        }

        .correct-pop {
            animation: pop 0.7s ease;
            color: #bbf7d0;
            text-shadow: 0 0 22px rgba(34, 197, 94, 0.9);
        }

        .wrong-shake {
            animation: shake 0.45s ease;
            color: #fecaca;
            text-shadow: 0 0 22px rgba(239, 68, 68, 0.65);
        }

        .winner-card {
            animation: winnerPulse 0.9s ease;
            box-shadow: inset 0 0 110px rgba(250, 204, 21, 0.58);
        }

        .percent-reveal {
            animation: revealPercent 0.65s ease;
        }

        .confetti-piece {
            position: fixed;
            top: -20px;
            font-size: 24px;
            z-index: 9999;
            pointer-events: none;
            animation: confettiFall 1.4s linear forwards;
        }

        @keyframes pop {
            0% { transform: scale(0.4); opacity: 0; }
            50% { transform: scale(1.25); opacity: 1; }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }

        @keyframes winnerPulse {
            0% { transform: scale(1); }
            45% { transform: scale(1.025); }
            100% { transform: scale(1); }
        }

        @keyframes revealPercent {
            0% { transform: scale(0.3) rotate(-8deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(3deg); opacity: 1; }
            100% { transform: scale(1) rotate(0); }
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 980px) {
            .hud {
                grid-template-columns: 1fr;
            }

            .preload-status {
                text-align: center;
            }
        }

        @media (max-width: 800px) {
            .top-shell {
                padding: 12px;
            }

            .nav-bar {
                flex-direction: column;
                gap: 12px;
            }

            .cards {
                grid-template-columns: 1fr;
            }

            .card {
                min-height: 430px;
                padding: 28px;
            }

            .course-code {
                font-size: 38px;
            }

            .course-name {
                font-size: 19px;
            }

            .percent,
            .hidden-percent {
                font-size: 64px;
            }

            .question-clear {
                font-size: 16px;
            }

            .message {
                font-size: 20px;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }

            .choice-button {
                width: min(280px, 100%);
            }
        }

        @media (max-width: 560px) {
            .meter-top {
                align-items: stretch;
                flex-direction: column;
            }

            .meter-bottom {
                grid-template-columns: 1fr;
            }

            .title-row {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="game">
        <div class="top-shell">
            <div class="nav-bar">
                <div class="brand">SECaT <span>Arcade</span></div>
                <div class="nav-links">
                    <a href="/" class="active">Higher or Lower</a>
                    <a href="/prediction">Prediction Market</a>
                </div>
            </div>

            <div class="hud">
                <div class="title-card">
                    <div class="title-row">
                        <h1>Higher or Lower</h1>
                        <div class="score-chip" id="score">0 / 0</div>
                    </div>

                    <div class="question-clear" id="questionText">
                        Loading question...
                    </div>
                </div>

                <div class="game-meter">
                    <div class="meter-top">
                        <div class="coin-badge">
                            <div class="coin-icon">🪙</div>
                            <div class="wallet-balance">0 SC</div>
                        </div>

                        <button class="meter-reset" onclick="resetStreak()" title="Reset streak and load a new round">
                            Reset Risk ↻
                        </button>
                    </div>

                    <div class="meter-main">
                        <div class="meter-label-row">
                            <div>
                                <div class="meter-label">Streak Power</div>
                                <div class="streak-big"><span id="streakValue">0</span><span>streak</span></div>
                            </div>
                            <div class="meter-label" id="meterStatus">Safe Mode</div>
                        </div>

                        <div class="power-track">
                            <div class="power-fill" id="powerFill"></div>
                            <div class="power-glint"></div>
                        </div>

                        <div class="meter-bottom">
                            <div class="meter-mini">
                                <div class="mini-label">Next win</div>
                                <div class="mini-value reward" id="nextRewardValue">+50 SC</div>
                            </div>

                            <div class="meter-mini">
                                <div class="mini-label">If wrong</div>
                                <div class="mini-value risk" id="nextLossValue">-15 SC</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="preload-status" id="preloadStatus"></div>
        </div>

        <div id="loading" class="loading">
            Loading a random SECaT round... this can take a few seconds.
        </div>

        <div class="cards" id="cards" style="display: none;">
            <div class="card left-card" id="leftCard">
                <div class="card-content">
                    <div class="course-code" id="leftCode"></div>
                    <div class="course-name" id="leftName"></div>
                    <div class="offering" id="leftOffering"></div>

                    <div class="answer-label">Had</div>
                    <div class="percent" id="leftPercent"></div>
                    <div class="answer-label" id="leftAnswer"></div>
                </div>
            </div>

            <div class="card right-card" id="rightCard">
                <div class="card-content">
                    <div class="course-code" id="rightCode"></div>
                    <div class="course-name" id="rightName"></div>
                    <div class="offering" id="rightOffering"></div>

                    <div class="answer-label">Had</div>
                    <div class="hidden-percent" id="rightPercent">?</div>
                    <div class="answer-label" id="rightAnswer"></div>

                    <div class="buttons" id="choiceButtons">
                        <button class="choice-button higher" onclick="makeGuess('higher')">Higher</button>
                        <button class="choice-button lower" onclick="makeGuess('lower')">Lower</button>
                    </div>

                    <div class="message" id="message"></div>

                    <button
                        class="next-button"
                        id="nextButton"
                        onclick="loadRound()"
                        style="display: none;"
                    >
                        Next Round
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WALLET_KEY = "secat_coin_balance";
        const STARTING_BALANCE = 500;

        const BASE_WIN_REWARD = 50;
        const BASE_LOSS_PENALTY = 15;

        const MULTIPLIER_STEP = 0.25;
        const MAX_MULTIPLIER = 5;

        const LOSS_STREAK_STEP = 0.25;
        const MAX_LOSS_MULTIPLIER = 4;

        let currentRound = null;
        let nextRoundPromise = null;
        let nextRoundData = null;

        let score = 0;
        let roundsPlayed = 0;
        let currentStreak = 0;
        let gameOver = false;

        function getWalletBalance() {
            const stored = localStorage.getItem(WALLET_KEY);

            if (stored === null) {
                localStorage.setItem(WALLET_KEY, STARTING_BALANCE);
                return STARTING_BALANCE;
            }

            return Number(stored);
        }

        function setWalletBalance(amount) {
            const safeAmount = Math.max(0, Math.round(amount));
            localStorage.setItem(WALLET_KEY, safeAmount);
            updateWalletDisplay();
        }

        function addCoins(amount) {
            const current = getWalletBalance();
            setWalletBalance(current + amount);
        }

        function updateWalletDisplay() {
            const walletElements = document.querySelectorAll(".wallet-balance");

            walletElements.forEach(element => {
                element.innerText = getWalletBalance() + " SC";
            });
        }

        function getCurrentMultiplier() {
            return Math.min(
                MAX_MULTIPLIER,
                1 + currentStreak * MULTIPLIER_STEP
            );
        }

        function getLossMultiplier() {
            return Math.min(
                MAX_LOSS_MULTIPLIER,
                1 + currentStreak * LOSS_STREAK_STEP
            );
        }

        function getCurrentReward() {
            return Math.round(BASE_WIN_REWARD * getCurrentMultiplier());
        }

        function getCurrentLossPenalty() {
            return Math.round(BASE_LOSS_PENALTY * getLossMultiplier());
        }

        function getPowerPercent() {
            const multiplier = getCurrentMultiplier();
            return Math.min(100, ((multiplier - 1) / (MAX_MULTIPLIER - 1)) * 100);
        }

        function getMeterStatus() {
            if (currentStreak === 0) {
                return "Safe Mode";
            }

            if (currentStreak < 3) {
                return "Warming Up";
            }

            if (currentStreak < 7) {
                return "Hot Streak";
            }

            if (currentStreak < 12) {
                return "Danger Zone";
            }

            return "Max Risk";
        }

        function updateHud() {
            document.getElementById("streakValue").innerText = currentStreak;

            document.getElementById("nextRewardValue").innerText =
                "+" + getCurrentReward() + " SC";

            document.getElementById("nextLossValue").innerText =
                "-" + getCurrentLossPenalty() + " SC";

            document.getElementById("powerFill").style.width =
                getPowerPercent() + "%";

            document.getElementById("meterStatus").innerText =
                getMeterStatus();

            updateWalletDisplay();
        }

        function resetStreak() {
            const message = document.getElementById("message");

            if (currentStreak === 0) {
                message.innerText = "Risk already reset. Loading a fresh round...";
                loadRound();
                return;
            }

            const confirmed = confirm(
                "Reset your streak and load a new round? This lowers both your reward and your risk."
            );

            if (!confirmed) {
                return;
            }

            currentStreak = 0;
            updateHud();

            message.innerText =
                "Risk reset. Loading a fresh round...";

            loadRound();
        }

        async function fetchRound() {
            const response = await fetch("/api/round");
            const data = await response.json();

            if (!response.ok || data.error) {
                throw new Error(data.error || "Could not load round.");
            }

            return data;
        }

        function startPreloadingNextRound() {
            nextRoundData = null;

            document.getElementById("preloadStatus").innerText =
                "Preparing next round...";

            nextRoundPromise = fetchRound()
                .then(data => {
                    nextRoundData = data;
                    document.getElementById("preloadStatus").innerText =
                        "Next round ready.";
                    return data;
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById("preloadStatus").innerText =
                        "Next round will load when you click Next.";
                    nextRoundData = null;
                    nextRoundPromise = null;
                });
        }

        async function loadRound() {
            gameOver = false;

            resetAnimations();

            document.getElementById("loading").style.display = "block";
            document.getElementById("loading").innerText =
                "Loading a random SECaT round... this can take a few seconds.";

            document.getElementById("cards").style.display = "none";
            document.getElementById("message").innerText = "";
            document.getElementById("rightPercent").innerText = "?";
            document.getElementById("choiceButtons").style.display = "flex";
            document.getElementById("nextButton").style.display = "none";

            try {
                let data;

                if (nextRoundData !== null) {
                    data = nextRoundData;
                    nextRoundData = null;
                    nextRoundPromise = null;
                } else if (nextRoundPromise !== null) {
                    document.getElementById("loading").innerText =
                        "Finishing the next round load...";
                    data = await nextRoundPromise;
                    nextRoundPromise = null;
                    nextRoundData = null;
                } else {
                    data = await fetchRound();
                }

                currentRound = data;
                renderRound(data);

                document.getElementById("loading").style.display = "none";
                document.getElementById("cards").style.display = "grid";

                startPreloadingNextRound();

            } catch (error) {
                document.getElementById("loading").innerText =
                    error.message || "Something went wrong loading the round.";
            }
        }

        function renderRound(data) {
            document.getElementById("questionText").innerHTML =
                `Which course offering had a <strong>higher percentage</strong> of students who selected ` +
                `<strong>${data.answer_option}</strong> for <strong>${data.question_name}</strong>?`;

            document.getElementById("leftCode").innerText = data.left.course;
            document.getElementById("leftName").innerText = data.left.name;
            document.getElementById("leftOffering").innerText =
                data.left.label.replace(data.left.course + ": ", "");
            document.getElementById("leftPercent").innerText =
                data.left.percent + "%";
            document.getElementById("leftAnswer").innerText =
                data.answer_option;

            document.getElementById("rightCode").innerText = data.right.course;
            document.getElementById("rightName").innerText = data.right.name;
            document.getElementById("rightOffering").innerText =
                data.right.label.replace(data.right.course + ": ", "");
            document.getElementById("rightAnswer").innerText =
                data.answer_option;
        }

        function makeGuess(guess) {
            if (gameOver || currentRound === null) {
                return;
            }

            gameOver = true;
            roundsPlayed += 1;

            const correctAnswer = currentRound.correct_answer;
            const wasCorrect = guess === correctAnswer;

            const rightPercent = document.getElementById("rightPercent");
            const message = document.getElementById("message");

            rightPercent.innerText = currentRound.right.percent + "%";
            rightPercent.classList.add("percent-reveal");

            const winningSide = getWinningSide();

            if (winningSide === "left") {
                document.getElementById("leftCard").classList.add("winner-card");
            } else if (winningSide === "right") {
                document.getElementById("rightCard").classList.add("winner-card");
            }

            if (wasCorrect) {
                const reward = getCurrentReward();
                const rewardMultiplier = getCurrentMultiplier();

                score += 1;
                addCoins(reward);

                message.innerHTML =
                    `Correct! +${reward} SC<br>` +
                    `Streak power paid x${rewardMultiplier.toFixed(2)}.`;

                message.classList.add("correct-pop");

                currentStreak += 1;
                launchConfetti();
            } else {
                const penalty = getCurrentLossPenalty();
                const lossMultiplier = getLossMultiplier();
                const lostStreak = currentStreak;

                addCoins(-penalty);

                message.innerHTML =
                    `Wrong! It was ${correctAnswer}. -${penalty} SC<br>` +
                    `Risk x${lossMultiplier.toFixed(2)} from streak ${lostStreak}.`;

                message.classList.add("wrong-shake");

                currentStreak = 0;
            }

            document.getElementById("score").innerText =
                score + " / " + roundsPlayed;

            updateHud();

            document.getElementById("choiceButtons").style.display = "none";
            document.getElementById("nextButton").style.display = "inline-block";
        }

        function getWinningSide() {
            const left = currentRound.left.percent;
            const right = currentRound.right.percent;

            if (left > right) {
                return "left";
            }

            if (right > left) {
                return "right";
            }

            return "same";
        }

        function resetAnimations() {
            document.getElementById("leftCard").classList.remove("winner-card");
            document.getElementById("rightCard").classList.remove("winner-card");
            document.getElementById("rightPercent").classList.remove("percent-reveal");
            document.getElementById("message").classList.remove("correct-pop");
            document.getElementById("message").classList.remove("wrong-shake");
        }

        function launchConfetti() {
            const emojis = ["🎉", "✨", "⭐", "🔥", "💯", "🎊", "🪙", "🚀"];

            for (let i = 0; i < 42; i++) {
                const piece = document.createElement("div");

                piece.className = "confetti-piece";
                piece.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                piece.style.left = Math.random() * 100 + "vw";
                piece.style.animationDelay = Math.random() * 0.25 + "s";
                piece.style.fontSize = (18 + Math.random() * 20) + "px";

                document.body.appendChild(piece);

                setTimeout(() => {
                    piece.remove();
                }, 1700);
            }
        }

        updateHud();
        loadRound();
    </script>
</body>
</html>
