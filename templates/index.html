<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECaT Higher or Lower</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #080b12;
            --panel: #111827;
            --panel-light: #172033;
            --border: #263247;
            --muted: #94a3b8;
            --text: #f8fafc;
            --yellow: #facc15;
            --green: #22c55e;
            --red: #ef4444;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: white;
            overflow-x: hidden;
        }

        .game {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-shell {
            background: #0f172a;
            border-bottom: 1px solid #334155;
            padding: 16px 24px 18px;
        }

        .nav-bar {
            max-width: 1180px;
            margin: 0 auto 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 12px 16px;
        }

        .brand {
            font-size: 20px;
            font-weight: 800;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            padding: 9px 14px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 14px;
        }

        .nav-links a.active {
            color: white;
            background: var(--panel-light);
            border: 1px solid var(--border);
        }

        .nav-links a:hover {
            color: white;
            background: #1f2937;
        }

        .top-bar {
            text-align: center;
        }

        .top-bar h1 {
            margin: 0;
            font-size: 34px;
        }

        .question-clear {
            margin: 12px auto 0;
            max-width: 900px;
            font-size: 18px;
            line-height: 1.45;
            color: #e5e7eb;
        }

        .question-clear strong {
            color: var(--yellow);
        }

        .stats-row {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat-pill {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 15px;
            font-weight: 800;
        }

        .wallet-pill {
            color: #fde68a;
        }

        .multiplier-pill {
            color: #bbf7d0;
        }

        .preload-status {
            margin-top: 8px;
            font-size: 13px;
            color: #94a3b8;
        }

        .cards {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .card {
            position: relative;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            min-height: 520px;
            overflow: hidden;
        }

        .left-card {
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
        }

        .right-card {
            background: linear-gradient(135deg, #dc2626, #7f1d1d);
        }

        .course-code {
            font-size: 44px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .course-name {
            font-size: 22px;
            margin-bottom: 16px;
            line-height: 1.35;
        }

        .offering {
            font-size: 18px;
            color: #e5e7eb;
            margin-bottom: 28px;
        }

        .answer-label {
            font-size: 20px;
            margin-bottom: 10px;
            color: #fef3c7;
        }

        .percent,
        .hidden-percent {
            font-size: 78px;
            font-weight: bold;
            margin: 16px 0;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
        }

        button {
            cursor: pointer;
            border: none;
            padding: 16px 28px;
            border-radius: 999px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: #111827;
            border: 2px solid white;
            transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
        }

        button:hover {
            background: white;
            color: #111827;
            transform: translateY(-2px) scale(1.03);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            min-height: 54px;
            margin-top: 24px;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.35;
        }

        .loading {
            padding: 30px;
            text-align: center;
            font-size: 22px;
            color: var(--yellow);
        }

        .next-button {
            margin-top: 20px;
            background: #16a34a;
            border-color: #16a34a;
        }

        .next-button:hover {
            background: white;
            color: #16a34a;
        }

        .correct-pop {
            animation: pop 0.7s ease;
            color: #bbf7d0;
            text-shadow: 0 0 18px rgba(34, 197, 94, 0.9);
        }

        .wrong-shake {
            animation: shake 0.45s ease;
            color: #fecaca;
        }

        .winner-card {
            animation: winnerPulse 0.9s ease;
            box-shadow: inset 0 0 90px rgba(250, 204, 21, 0.45);
        }

        .percent-reveal {
            animation: revealPercent 0.65s ease;
        }

        .confetti-piece {
            position: fixed;
            top: -20px;
            font-size: 24px;
            z-index: 9999;
            pointer-events: none;
            animation: confettiFall 1.4s linear forwards;
        }

        @keyframes pop {
            0% {
                transform: scale(0.4);
                opacity: 0;
            }
            50% {
                transform: scale(1.25);
                opacity: 1;
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-10px);
            }
            40% {
                transform: translateX(10px);
            }
            60% {
                transform: translateX(-8px);
            }
            80% {
                transform: translateX(8px);
            }
        }

        @keyframes winnerPulse {
            0% {
                transform: scale(1);
            }
            45% {
                transform: scale(1.035);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes revealPercent {
            0% {
                transform: scale(0.3) rotate(-8deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.2) rotate(3deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0);
            }
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 800px) {
            .top-shell {
                padding: 12px;
            }

            .nav-bar {
                flex-direction: column;
                gap: 12px;
            }

            .cards {
                grid-template-columns: 1fr;
            }

            .card {
                min-height: 420px;
                padding: 28px;
            }

            .course-code {
                font-size: 34px;
            }

            .percent,
            .hidden-percent {
                font-size: 58px;
            }

            .question-clear {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="game">
        <div class="top-shell">
            <div class="nav-bar">
                <div class="brand">SECaT Markets</div>
                <div class="nav-links">
                    <a href="/" class="active">Higher or Lower</a>
                    <a href="/prediction">Prediction Market</a>
                </div>
            </div>

            <div class="top-bar">
                <h1>SECaT Higher or Lower</h1>

                <div class="question-clear" id="questionText">
                    Loading question...
                </div>

                <div class="stats-row">
                    <div class="stat-pill" id="score">Score: 0 / 0</div>
                    <div class="stat-pill wallet-pill">Wallet: <span class="wallet-balance">0 SC</span></div>
                    <div class="stat-pill">Streak: <span id="streakValue">0</span></div>
                    <div class="stat-pill multiplier-pill">Multiplier: <span id="multiplierValue">x1.00</span></div>
                </div>

                <div class="preload-status" id="preloadStatus"></div>
            </div>
        </div>

        <div id="loading" class="loading">
            Loading a random SECaT round... this can take a few seconds.
        </div>

        <div class="cards" id="cards" style="display: none;">
            <div class="card left-card" id="leftCard">
                <div class="course-code" id="leftCode"></div>
                <div class="course-name" id="leftName"></div>
                <div class="offering" id="leftOffering"></div>

                <div class="answer-label">had</div>
                <div class="percent" id="leftPercent"></div>
                <div class="answer-label" id="leftAnswer"></div>
            </div>

            <div class="card right-card" id="rightCard">
                <div class="course-code" id="rightCode"></div>
                <div class="course-name" id="rightName"></div>
                <div class="offering" id="rightOffering"></div>

                <div class="answer-label">had</div>
                <div class="hidden-percent" id="rightPercent">?</div>
                <div class="answer-label" id="rightAnswer"></div>

                <div class="buttons" id="choiceButtons">
                    <button onclick="makeGuess('higher')">Higher</button>
                    <button onclick="makeGuess('lower')">Lower</button>
                </div>

                <div class="message" id="message"></div>

                <button
                    class="next-button"
                    id="nextButton"
                    onclick="loadRound()"
                    style="display: none;"
                >
                    Next Round
                </button>
            </div>
        </div>
    </div>

    <script>
        const WALLET_KEY = "secat_coin_balance";
        const STARTING_BALANCE = 500;

        const BASE_WIN_REWARD = 50;
        const BASE_LOSS_PENALTY = 25;
        const MULTIPLIER_STEP = 0.25;
        const MAX_MULTIPLIER = 5;

        let currentRound = null;
        let nextRoundPromise = null;
        let nextRoundData = null;

        let score = 0;
        let roundsPlayed = 0;
        let currentStreak = 0;
        let gameOver = false;

        function getWalletBalance() {
            const stored = localStorage.getItem(WALLET_KEY);

            if (stored === null) {
                localStorage.setItem(WALLET_KEY, STARTING_BALANCE);
                return STARTING_BALANCE;
            }

            return Number(stored);
        }

        function setWalletBalance(amount) {
            const safeAmount = Math.max(0, Math.round(amount));
            localStorage.setItem(WALLET_KEY, safeAmount);
            updateWalletDisplay();
        }

        function addCoins(amount) {
            const current = getWalletBalance();
            setWalletBalance(current + amount);
        }

        function spendCoins(amount) {
            const current = getWalletBalance();

            if (amount > current) {
                return false;
            }

            setWalletBalance(current - amount);
            return true;
        }

        function updateWalletDisplay() {
            const walletElements = document.querySelectorAll(".wallet-balance");

            walletElements.forEach(element => {
                element.innerText = getWalletBalance() + " SC";
            });
        }

        function getCurrentMultiplier() {
            return Math.min(
                MAX_MULTIPLIER,
                1 + currentStreak * MULTIPLIER_STEP
            );
        }

        function updateMultiplierDisplay() {
            document.getElementById("streakValue").innerText = currentStreak;
            document.getElementById("multiplierValue").innerText =
                "x" + getCurrentMultiplier().toFixed(2);
        }

        async function fetchRound() {
            const response = await fetch("/api/round");
            const data = await response.json();

            if (!response.ok || data.error) {
                throw new Error(data.error || "Could not load round.");
            }

            return data;
        }

        function startPreloadingNextRound() {
            nextRoundData = null;

            document.getElementById("preloadStatus").innerText =
                "Preparing next round in the background...";

            nextRoundPromise = fetchRound()
                .then(data => {
                    nextRoundData = data;
                    document.getElementById("preloadStatus").innerText =
                        "Next round ready.";
                    return data;
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById("preloadStatus").innerText =
                        "Next round will load when you click Next.";
                    nextRoundData = null;
                    nextRoundPromise = null;
                });
        }

        async function loadRound() {
            gameOver = false;

            resetAnimations();

            document.getElementById("loading").style.display = "block";
            document.getElementById("loading").innerText =
                "Loading a random SECaT round... this can take a few seconds.";

            document.getElementById("cards").style.display = "none";
            document.getElementById("message").innerText = "";
            document.getElementById("rightPercent").innerText = "?";
            document.getElementById("choiceButtons").style.display = "flex";
            document.getElementById("nextButton").style.display = "none";

            try {
                let data;

                if (nextRoundData !== null) {
                    data = nextRoundData;
                    nextRoundData = null;
                    nextRoundPromise = null;
                } else if (nextRoundPromise !== null) {
                    document.getElementById("loading").innerText =
                        "Finishing the next round load...";
                    data = await nextRoundPromise;
                    nextRoundPromise = null;
                    nextRoundData = null;
                } else {
                    data = await fetchRound();
                }

                currentRound = data;
                renderRound(data);

                document.getElementById("loading").style.display = "none";
                document.getElementById("cards").style.display = "grid";

                startPreloadingNextRound();

            } catch (error) {
                document.getElementById("loading").innerText =
                    error.message || "Something went wrong loading the round.";
            }
        }

        function renderRound(data) {
            document.getElementById("questionText").innerHTML =
                `Which course offering had a <strong>higher percentage</strong> of students who selected ` +
                `<strong>${data.answer_option}</strong> for <strong>${data.question_name}</strong>?`;

            document.getElementById("leftCode").innerText = data.left.course;
            document.getElementById("leftName").innerText = data.left.name;
            document.getElementById("leftOffering").innerText =
                data.left.label.replace(data.left.course + ": ", "");
            document.getElementById("leftPercent").innerText =
                data.left.percent + "%";
            document.getElementById("leftAnswer").innerText =
                data.answer_option;

            document.getElementById("rightCode").innerText = data.right.course;
            document.getElementById("rightName").innerText = data.right.name;
            document.getElementById("rightOffering").innerText =
                data.right.label.replace(data.right.course + ": ", "");
            document.getElementById("rightAnswer").innerText =
                data.answer_option;
        }

        function makeGuess(guess) {
            if (gameOver || currentRound === null) {
                return;
            }

            gameOver = true;
            roundsPlayed += 1;

            const correctAnswer = currentRound.correct_answer;
            const wasCorrect = guess === correctAnswer;

            const rightPercent = document.getElementById("rightPercent");
            const message = document.getElementById("message");

            rightPercent.innerText = currentRound.right.percent + "%";
            rightPercent.classList.add("percent-reveal");

            const winningSide = getWinningSide();

            if (winningSide === "left") {
                document.getElementById("leftCard").classList.add("winner-card");
            } else if (winningSide === "right") {
                document.getElementById("rightCard").classList.add("winner-card");
            }

            const multiplier = getCurrentMultiplier();

            if (wasCorrect) {
                const reward = Math.round(BASE_WIN_REWARD * multiplier);

                score += 1;
                addCoins(reward);

                message.innerHTML =
                    `Correct! +${reward} SC<br>` +
                    `Multiplier used: x${multiplier.toFixed(2)}`;

                message.classList.add("correct-pop");

                currentStreak += 1;
                launchConfetti();
            } else {
                const penalty = Math.round(BASE_LOSS_PENALTY * multiplier);

                addCoins(-penalty);

                message.innerHTML =
                    `Wrong! It was ${correctAnswer}. -${penalty} SC<br>` +
                    `Your streak was reset.`;

                message.classList.add("wrong-shake");

                currentStreak = 0;
            }

            document.getElementById("score").innerText =
                "Score: " + score + " / " + roundsPlayed;

            updateWalletDisplay();
            updateMultiplierDisplay();

            document.getElementById("choiceButtons").style.display = "none";
            document.getElementById("nextButton").style.display = "inline-block";
        }

        function getWinningSide() {
            const left = currentRound.left.percent;
            const right = currentRound.right.percent;

            if (left > right) {
                return "left";
            }

            if (right > left) {
                return "right";
            }

            return "same";
        }

        function resetAnimations() {
            document.getElementById("leftCard").classList.remove("winner-card");
            document.getElementById("rightCard").classList.remove("winner-card");
            document.getElementById("rightPercent").classList.remove("percent-reveal");
            document.getElementById("message").classList.remove("correct-pop");
            document.getElementById("message").classList.remove("wrong-shake");
        }

        function launchConfetti() {
            const emojis = ["🎉", "✨", "⭐", "🔥", "💯", "🎊"];

            for (let i = 0; i < 36; i++) {
                const piece = document.createElement("div");

                piece.className = "confetti-piece";
                piece.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                piece.style.left = Math.random() * 100 + "vw";
                piece.style.animationDelay = Math.random() * 0.25 + "s";
                piece.style.fontSize = (18 + Math.random() * 18) + "px";

                document.body.appendChild(piece);

                setTimeout(() => {
                    piece.remove();
                }, 1700);
            }
        }

        updateWalletDisplay();
        updateMultiplierDisplay();
        loadRound();
    </script>
</body>
</html>
